<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: white;
      text-align: center;
      padding: 20px;
    }

    nav {
      background: #555;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px 0;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #333;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <h1>Welcome to My Website 🚀</h1>
  <p>Created by You</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>

<div class="container">

  <div class="card">
    <h2>About Me</h2>
    <p>I am a MCA student learning web development and AI projects.</p>
  </div>

  <div class="card">
    <h2>My Project</h2>
    <img src="https://picsum.photos/800/400" alt="Project Image">
    <p>This is my first hosted website using Vercel.</p>
  </div>

  <div class="card">
    <h2>Contact</h2>
    <p>Email: example@gmail.com</p>
  </div>

</div>

<footer>
  <p>© 2026 My Website</p>
</footer>

</body>
</html>
